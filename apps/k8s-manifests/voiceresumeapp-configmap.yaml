apiVersion: v1
kind: ConfigMap
metadata:
  name: voiceresumeapp-config
  namespace: production
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  DATABASE_URL: "postgresql://voiceresumeai:voiceresumeai@postgres-svc:5432/voiceresumeai"
  SQL_ECHO: "false"
  # S3_ENDPOINT, S3_BUCKET, S3_ACCESS_KEY, S3_SECRET_KEY set via Secrets
  # OPENAI_API_KEY set via Secrets
  # JWT_SECRET set via Secrets

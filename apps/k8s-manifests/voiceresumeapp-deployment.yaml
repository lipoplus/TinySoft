apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceresumeapp
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voiceresumeapp
  template:
    metadata:
      labels:
        app: voiceresumeapp
    spec:
      initContainers:
      - name: migrations
        image: voiceresumeapp:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: voiceresumeapp-config
              key: DATABASE_URL
        command:
        - sh
        - -c
        - "alembic upgrade head || true"
      containers:
      - name: voiceresumeapp
        image: voiceresumeapp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: voiceresumeapp-config
        - secretRef:
            name: voiceresumeapp-secrets
        env:
        - name: S3_ENDPOINT
          value: "http://minio-svc:9000"
        - name: S3_BUCKET
          value: "voiceresumeai"
        - name: S3_ACCESS_KEY
          value: "minioadmin"
        - name: S3_SECRET_KEY
          value: "minioadmin"
        - name: S3_REGION
          value: "us-east-1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      restartPolicy: Always

apiVersion: apps/v1
kind: Deployment
metadata:
  name: voiceresumeapp
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voiceresumeapp
  template:
    metadata:
      labels:
        app: voiceresumeapp
    spec:
      containers:
      - name: voiceresumeapp
        image: ghcr.io/voiceresumeai/voiceresumeapp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: voiceresumeapp-config
        - secretRef:
            name: voiceresumeapp-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

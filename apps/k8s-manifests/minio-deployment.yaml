apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio-svc
  namespace: production
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
  - name: minio-api
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: minio-console
    port: 9001
    targetPort: 9001
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
          name: minio-api
        - containerPort: 9001
          name: minio-console
        env:
        - name: MINIO_ROOT_USER
          value: minioadmin
        - name: MINIO_ROOT_PASSWORD
          value: minioadmin
        - name: MINIO_BROWSER
          value: "on"
        volumeMounts:
        - name: minio-storage
          mountPath: /minio_data
        command:
        - /bin/sh
        - -c
        - minio server /minio_data --console-address :9001
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: minio-storage
        persistentVolumeClaim:
          claimName: minio-pvc
